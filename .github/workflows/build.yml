name: Build and Push

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -count=1

  build:
    needs: test
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    # Skip publish on PRs (no write to ghcr from forks); still build to verify.
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # Embed privasys.json (MCP manifest) as an OCI image label so the
      # management-service can auto-detect tools/UI for package-source
      # container apps via FetchOCILabel("org.privasys.manifest").
      # Without this, the API Testing / AI Tools tabs are hidden in the
      # developer portal.
      #
      # The manifest is base64-encoded: a raw-JSON label value with several
      # `","` sequences (e.g. multi-value enums) gets mangled by the build
      # step's CSV-style label parsing, which strips interior quotes and
      # produces invalid JSON. base64 has no quotes/commas, so it survives
      # losslessly; the management-service decodes either form.
      - name: Read privasys.json
        id: manifest
        run: |
          if [ -f privasys.json ]; then
            echo "json=$(jq -c . privasys.json | base64 -w0)" >> "$GITHUB_OUTPUT"
          fi

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.privasys.manifest=${{ steps.manifest.outputs.json }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          {
            echo "## container-app-lightpanda published"
            echo
            echo '**Pinned reference (use this for reproducible deploys):**'
            echo
            echo '```'
            echo "${REGISTRY}/${IMAGE_NAME,,}@${{ steps.build.outputs.digest }}"
            echo '```'
            echo
            echo '**Tags:**'
            echo
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
